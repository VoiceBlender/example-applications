<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} · Contact Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #0a0d12;
  --bg-2:          #131820;
  --bg-3:          #1b2230;
  --border:        #262d3c;
  --border-bright: #3a4358;
  --fg:            #e6ebf3;
  --fg-dim:        #8a93a3;
  --fg-mute:       #565d6e;
  --amber:         #ffa940;
  --amber-dim:     #b97920;
  --amber-glow:    rgba(255,169,64,.22);
  --cyan:          #5ec8e8;
  --cyan-dim:      #34708a;
  --green:         #5ee2a4;
  --green-dim:     #2e7d54;
  --red:           #ff5d6c;
  --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100vh; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: 14px;
  display: grid;
  place-items: center;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 12% -8%, rgba(255,169,64,0.06), transparent 70%),
    radial-gradient(ellipse 40% 30% at 100% 100%, rgba(94,200,232,0.04), transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.card {
  position: relative;
  z-index: 1;
  width: min(420px, 92vw);
  border: 1px solid var(--border-bright);
  background: var(--bg-2);
  padding: 28px 28px 24px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.brand {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
}
.brand-mark {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border: 1px solid var(--amber-dim);
  background: rgba(255,169,64,0.06);
}
.brand-name {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.brand-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-mute);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 1px;
}
h1 {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg);
  margin: 0 0 18px;
}
h1::before {
  content: '';
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--cyan);
  vertical-align: middle;
  margin-right: 10px;
  transform: translateY(-2px);
}
label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
input[type="text"], input[type="password"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--fg);
  padding: 11px 12px;
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.02em;
  outline: none;
  transition: border-color 160ms;
}
input[type="text"]:focus, input[type="password"]:focus {
  border-color: var(--amber);
}
.field + .field { margin-top: 14px; }
button {
  margin-top: 18px;
  width: 100%;
  background: transparent;
  border: 1px solid var(--amber);
  color: var(--amber);
  padding: 11px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 160ms, color 160ms;
}
button:hover {
  background: var(--amber);
  color: var(--bg);
}
.error {
  margin-top: 14px;
  padding: 10px 12px;
  border: 1px solid var(--red);
  background: linear-gradient(180deg, rgba(255,93,108,0.06), transparent);
  color: var(--red);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
}
.foot {
  margin-top: 22px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-mute);
  text-align: center;
}
.foot a {
  color: var(--fg-dim);
  text-decoration: none;
  border-bottom: 1px dotted var(--fg-mute);
}
.foot a:hover { color: var(--fg); }
</style>
</head>
<body>
<form class="card" method="POST" action="/login">
  <div class="brand">
    <div class="brand-mark">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <rect x="0" y="5" width="2" height="4" fill="var(--amber)"/>
        <rect x="4" y="2" width="2" height="10" fill="var(--amber)"/>
        <rect x="8" y="0" width="2" height="14" fill="var(--amber)"/>
        <rect x="12" y="4" width="2" height="6" fill="var(--amber)"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Contact Centre</div>
      <div class="brand-sub">{{.Role}} access</div>
    </div>
  </div>
  <h1>{{.Title}}</h1>
  <input type="hidden" name="role" value="{{.Role}}">
  <input type="hidden" name="next" value="{{.Next}}">
  <div class="field">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" autofocus required>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
  </div>
  {{if .Failed}}<div class="error">Wrong password.</div>{{end}}
  <button type="submit">Sign in</button>
  <div class="foot">
    {{if eq .Role "supervisor"}}<a href="/login?role=agent">Agent sign-in &rarr;</a>{{else}}<a href="/login?role=supervisor">Supervisor sign-in &rarr;</a>{{end}}
  </div>
</form>
</body>
</html>
